# ops 提单 API 反向代理 —— companyPlan Node(127.0.0.1:4174)
# 前端在 OSS:https://ops.soyootech.com ;本服务:https://opsapi.soyootech.com  → 跨域(同主域不同子域)
# 放到 /etc/nginx/conf.d/opsapi.soyoo.conf,然后 nginx -t && nginx -s reload
#
# 跨域要点:
#   1) CORS 响应头(下面 location 里);白名单只放前端域名 https://ops.soyootech.com
#   2) 会话 cookie 的 SameSite=None;Secure 由 Node 处理(.env.prod: COMPANYPLAN_COOKIE_SAMESITE=none)
#      —— 不用 proxy_cookie_flags(该指令需 nginx ≥ 1.19.3,老版本会报 unknown directive)
#   3) Node 侧还需 .env.prod 配 COMPANYPLAN_ALLOWED_ORIGINS=https://ops.soyootech.com
#      否则写接口(含登录 POST)会被 validateWriteOrigin 拦成 403

server {
    listen 443 ssl;
    server_name opsapi.soyootech.com;

    client_max_body_size 20M;            # 富文本 base64 上传(Node 限 16mb)

    access_log /var/log/nginx/companyplan_opsapi_access.log;
    error_log  /var/log/nginx/companyplan_opsapi_error.log;

    ssl_certificate     /root/xibushuma_cert/_.soyootech.com.crt;   # 通配证书,直接复用
    ssl_certificate_key /root/xibushuma_cert/_.soyootech.com.key;
    ssl_session_timeout 5m;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        set $allow_origin "https://ops.soyootech.com";

        # CORS 预检:直接 204 返回,不打到 Node
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $allow_origin always;
            add_header Access-Control-Allow-Credentials true          always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Content-Type, Authorization, X-Requested-With" always;
            add_header Access-Control-Max-Age           86400 always;
            add_header Content-Length 0;
            return 204;
        }

        # 实际请求:带上 CORS 头(凭证模式必须指定确切 origin,不能用 *)
        add_header Access-Control-Allow-Origin      $allow_origin always;
        add_header Access-Control-Allow-Credentials true          always;

        proxy_pass http://127.0.0.1:4174;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# HTTP → HTTPS(307 保留 POST)
server {
    listen 80;
    listen [::]:80;
    server_name opsapi.soyootech.com;
    return 307 https://$host$request_uri;
}
