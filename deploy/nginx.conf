# ops 提单 API 反向代理 —— companyPlan Node(127.0.0.1:4174)
# 前端在 OSS:https://ops.soyootech.com ;本服务:https://opsapi.soyootech.com
#
# 重要:CORS 全部由 Node 处理(apps/server/middleware/security.mjs 回显 Origin + 处理 OPTIONS)。
#       这里 nginx 只做纯反代,绝不能再加 add_header Access-Control-*,
#       否则会和 Node 的头叠加 → "Access-Control-Allow-Origin 出现多个值" → 浏览器报错。
#
# 放到 /etc/nginx/conf.d/opsapi.soyoo.conf,然后 nginx -t && nginx -s reload

server {
    listen 443 ssl;
    server_name opsapi.soyootech.com;

    client_max_body_size 20M;            # 富文本 base64 上传(Node 限 16mb)

    access_log /var/log/nginx/companyplan_opsapi_access.log;
    error_log  /var/log/nginx/companyplan_opsapi_error.log;

    ssl_certificate     /root/xibushuma_cert/_.soyootech.com.crt;   # 通配证书,直接复用
    ssl_certificate_key /root/xibushuma_cert/_.soyootech.com.key;
    ssl_session_timeout 5m;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:4174;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# HTTP → HTTPS(307 保留 POST)
server {
    listen 80;
    listen [::]:80;
    server_name opsapi.soyootech.com;
    return 307 https://$host$request_uri;
}
